function nextPage(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function startCountdown(){

username=document.getElementById("username").value;

if(username.trim() === ""){
document.getElementById("nameError").innerText =
"⚠ Please enter your name";
return;
}

document.getElementById("nameError").innerText="";
nextPage("countPage");

let t=3;

let timer=setInterval(()=>{

t--;
document.getElementById("count").innerText=t;

if(t<=0){
clearInterval(timer);
startQuiz();
}

},1000);

}

function startQuiz(){
nextPage("quizPage");
showQuestion();
}

function startTimer(){

clearInterval(timer);
timeLeft = 10;

timer = setInterval(()=>{

timeLeft--;

document.getElementById("timer").innerText = timeLeft;

let percent = (timeLeft/10)*100;
let bar = document.getElementById("timerBar");

bar.style.width = percent + "%";

if(timeLeft <= 6){
bar.style.background = "gold";
}

if(timeLeft <= 3){
bar.style.background = "red";
}

if(timeLeft <= 0){
clearInterval(timer);

let correct = questions[current].a;
answer(correct);

}

},1000);

}

function showQuestion(){

document.getElementById("feedback").innerText="";
startTimer();

let q=questions[current];

let percent = ((current) / questions.length) * 100;
document.getElementById("qBar").style.width = percent + "%";

document.getElementById("progress").innerText =
"Question " + (current+1) + " / " + questions.length;

document.getElementById("question").innerText=(current+1)+". "+q.q;

let html="";

q.c.forEach((choice,i)=>{

html+=`
<div class="option" onclick="answer(${i})">
<img src="${q.img[i]}">
<p>${choice}</p>
</div>
`;

});

document.getElementById("options").innerHTML=html;

document.getElementById("bar").style.width=((current)/questions.length*100)+"%";

document.body.style.background=`hsl(${current*60},70%,80%)`;

}

function answer(i){

let correct=questions[current].a;

let options=document.querySelectorAll(".option");

options[correct].classList.add("correct");

if(i!==correct){

options[i].classList.add("wrong");

document.getElementById("wrongSound").play();

document.getElementById("feedback").innerText=
wrongTexts[Math.floor(Math.random()*wrongTexts.length)];

}else{

score+=100;
document.getElementById("correctSound").play();
document.getElementById("feedback").innerText=
correctTexts[current];

let pop=document.getElementById("scorePopup");
pop.innerText="+100 🎉";
pop.classList.add("showScore");

setTimeout(()=>{
pop.classList.remove("showScore");
},1000);

}
setTimeout(()=>{

current++;

if(current<questions.length){
showQuestion();
}else{
finishQuiz();
}

},1000);

}

async function finishQuiz(){

nextPage("resultPage");
 
let message="";

if(score<=300){
message="💀 Bro... do you even know me?";
}
else if(score<=700){
message="😂 Hmm... you kinda know me";
}
